# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Vince's Blog
subtitle: ''
description: 'Vince的博客'
keywords:
author: Vince
language: zh-CN
timezone: ''

# URL
url: https://haomingzhang.com
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - README.md
  - .gitignore

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
  技术: 技术
  游戏: 游戏
  算法: 算法
  记录: 记录
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
  - .gitignore
exclude:
ignore:

# Sitemap
sitemap:
  path:
    - sitemap.xml
baidusitemap:
  path: baidusitemap.xml

# Local search
search:
  path: search.xml
  field: post
  content: true
  format: html

# Extensions
theme: next

# Deployment
deploy:
  type: git
  repo: git@github.com:haomingvince/haomingvince.github.io.git
  branch: master
